# CARLOS-OS .tool-fabric.yaml
# Registry governance schema for CARLOS-OS — a multi-agent personal OS.
#
# Tools covered: external integrations (GitHub, Linear, Slack, Gmail, etc.)
# + internal CARLOS-OS MCP server tools (memory, knowledge base, situations).
# Fully specified: 21 tools. Stub entries: 19 tools (same pattern, expand before use).
#
# Categories: project-management, communication, code, file-system,
# ai-inference, search, finance, calendar, devops, memory.

tools:

  # ── Project Management ─────────────────────────────────────────────────────

  github_create_issue:
    category: project-management
    description: >
      Creates a new issue in a GitHub repository and returns the issue URL
      and number. Use when tracking a bug, task, or feature request in a
      GitHub-hosted project. Do NOT use for Linear or Jira projects.
    concepts_required: [github.repo, github.auth]
    alternatives: [linear_create_issue]
    composes_with: [github_assign_issue, github_add_label, github_link_pr]
    input_shape:
      repo: string
      title: string
      body: string
      labels: array
    output_shape:
      issue_url: string
      issue_number: integer
      repo: string
    query_tips: >
      Use when the project tracks work in GitHub Issues.
      For Linear-managed projects (e.g. CARLOS-OS sprints), use linear_create_issue.
    cost_hints:
      latency_ms: 300
      tokens_consumed: 0
      idempotent: false
      side_effects: [creates_github_issue, sends_github_notification]

  linear_create_issue:
    category: project-management
    description: >
      Creates a new issue in a Linear project and returns the issue URL
      and identifier. Use when the team tracks work in Linear.
      Do NOT use for GitHub Issues or Jira tickets.
    concepts_required: [linear.project, linear.team, linear.auth]
    alternatives: [github_create_issue]
    composes_with: [linear_assign_issue, linear_set_priority, linear_add_to_cycle]
    input_shape:
      team_id: string
      title: string
      description: string
      priority: integer
    output_shape:
      issue_url: string
      issue_id: string
      identifier: string
    query_tips: >
      CARLOS-OS sprints are managed in Linear (team: CARLOS).
      Use this for all personal OS task tracking.
    cost_hints:
      latency_ms: 250
      tokens_consumed: 0
      idempotent: false
      side_effects: [creates_linear_issue]

  github_search_issues:
    category: project-management
    description: >
      Searches GitHub issues and pull requests by query string and returns
      a ranked list of matching items. Use to find existing issues before
      creating a new one, or to audit open work. Returns up to 30 results.
    concepts_required: [github.repo, github.auth]
    alternatives: [linear_search_issues]
    composes_with: [github_create_issue, github_close_issue]
    input_shape:
      query: string
      repo: string
      state: string
    output_shape:
      issues: array
      total_count: integer
      repo: string
    query_tips: >
      Use before github_create_issue to check for duplicates.
    cost_hints:
      latency_ms: 400
      tokens_consumed: 0
      idempotent: true
      side_effects: []

  # ── Communication ──────────────────────────────────────────────────────────

  slack_send_message:
    category: communication
    description: >
      Sends a message to a Slack channel or DM and returns the message
      timestamp. Use for team notifications, status updates, or async
      communication. Do NOT use for email — use gmail_send instead.
    concepts_required: [slack.channel, slack.auth]
    alternatives: [gmail_send]
    composes_with: [slack_add_reaction, slack_send_message_thread]
    input_shape:
      channel_id: string
      text: string
      thread_ts: string
    output_shape:
      message_ts: string
      channel_id: string
    query_tips: >
      Use for Slack workspaces. CARLOS-OS cockpit uses #carlos-os channel.
      For formal communications, use gmail_send.
    cost_hints:
      latency_ms: 150
      tokens_consumed: 0
      idempotent: false
      side_effects: [sends_slack_message, triggers_slack_notification]

  gmail_send:
    category: communication
    description: >
      Sends an email via Gmail and returns the sent message ID.
      Use for formal communications, external parties, or when a thread
      record is needed. Do NOT use for internal team chat — use slack_send_message.
    concepts_required: [gmail.auth, gmail.identity]
    alternatives: [slack_send_message]
    composes_with: [gmail_add_label]
    input_shape:
      to: string
      subject: string
      body: string
      cc: string
      attachments: array
    output_shape:
      message_id: string
      thread_id: string
    query_tips: >
      For external parties or formal records. For quick team comms, prefer Slack.
    cost_hints:
      latency_ms: 500
      tokens_consumed: 0
      idempotent: false
      side_effects: [sends_email, creates_sent_record]

  # ── Code & DevOps ──────────────────────────────────────────────────────────

  bash_execute:
    category: code
    description: >
      Executes a shell command and returns stdout, stderr, and exit code.
      Use for system operations, file manipulation, and running scripts.
      Commands run in the user's shell with their environment.
      Do NOT use for Python code — use python_execute for isolated execution.
    concepts_required: [system.shell, system.cwd]
    alternatives: [python_execute]
    composes_with: [bash_execute]
    input_shape:
      command: string
      cwd: string
      timeout_ms: integer
    output_shape:
      stdout: string
      stderr: string
      exit_code: integer
      cwd: string
    query_tips: >
      Use for shell operations. For Python scripts, use python_execute
      which provides better error isolation.
    cost_hints:
      latency_ms: 100
      tokens_consumed: 0
      idempotent: false
      side_effects: [may_modify_filesystem, may_spawn_processes]

  github_create_pr:
    category: devops
    description: >
      Creates a pull request on GitHub and returns the PR URL and number.
      Requires a branch with commits already pushed. Use after completing
      a feature or fix branch. Do NOT use to push code — use bash_execute for git push.
    concepts_required: [github.repo, github.branch, github.auth]
    alternatives: []
    composes_with: [github_request_review, github_add_label]
    input_shape:
      repo: string
      base_branch: string
      head_branch: string
      title: string
      body: string
    output_shape:
      pr_url: string
      pr_number: integer
      repo: string
    query_tips: >
      Always run after pushing the feature branch. Link to the relevant
      Linear issue in the PR body using the pattern "Closes LIN-{id}".
    cost_hints:
      latency_ms: 400
      tokens_consumed: 0
      idempotent: false
      side_effects: [creates_github_pr, sends_github_notification, may_trigger_ci]

  # ── Search & Research ──────────────────────────────────────────────────────

  web_search:
    category: search
    description: >
      Searches the web for current information and returns ranked results
      with titles, URLs, and snippets. Use for facts not in training data,
      current events, and external documentation. Prefer over web_fetch
      when you need to discover the right URL rather than fetch a known one.
    concepts_required: []
    alternatives: [web_fetch, docs_search]
    composes_with: [web_fetch]
    input_shape:
      query: string
      num_results: integer
    output_shape:
      results: array
      query: string
      url: url
    query_tips: >
      Use when you need to find URLs. Once you have the URL, use web_fetch
      to read the full page content.
    cost_hints:
      latency_ms: 800
      tokens_consumed: 0
      idempotent: true
      side_effects: []

  web_fetch:
    category: search
    description: >
      Fetches the full text content of a URL and returns it as markdown.
      Use when you already have a URL and need the full page content.
      Do NOT use for general search — use web_search to discover URLs first.
    concepts_required: []
    alternatives: [web_search]
    composes_with: []
    input_shape:
      url: url
      max_length: integer
    output_shape:
      content: string
      url: url
      title: string
    query_tips: >
      Use after web_search when you need full page content.
      Not suitable for pages requiring authentication.
    cost_hints:
      latency_ms: 1200
      tokens_consumed: 200
      idempotent: true
      side_effects: []

  # ── File System ────────────────────────────────────────────────────────────

  file_read:
    category: file-system
    description: >
      Reads a file from the local filesystem and returns its contents.
      Supports text files of any format. Use for config files, logs,
      source code, and documents. Returns error if file does not exist.
    concepts_required: [system.cwd]
    alternatives: []
    composes_with: [file_write]
    input_shape:
      path: file_path
      offset: integer
      limit: integer
    output_shape:
      content: string
      path: file_path
      lines: integer
    query_tips: >
      Always read before writing to avoid overwriting unknown content.
    cost_hints:
      latency_ms: 10
      tokens_consumed: 0
      idempotent: true
      side_effects: []

  file_write:
    category: file-system
    description: >
      Writes content to a file on the local filesystem. Overwrites if the
      file exists. Use for creating or updating config files, scripts,
      and generated content. Read the file first to avoid data loss.
    concepts_required: [system.cwd]
    alternatives: []
    composes_with: [file_read]
    input_shape:
      path: file_path
      content: string
    output_shape:
      path: file_path
      bytes_written: integer
    query_tips: >
      Prefer edit_file for partial modifications to avoid full rewrites.
    cost_hints:
      latency_ms: 10
      tokens_consumed: 0
      idempotent: false
      side_effects: [modifies_filesystem]

  # ── AI Inference ───────────────────────────────────────────────────────────

  claude_invoke:
    category: ai-inference
    description: >
      Invokes Claude (Anthropic) for a generation task and returns the
      response. Use for drafting, summarizing, classifying, or reasoning
      tasks that require LLM capability. Specify the model explicitly.
      Do NOT use for tasks that can be done with deterministic tools.
    concepts_required: [anthropic.auth]
    alternatives: [gemini_invoke, gpt_invoke]
    composes_with: []
    input_shape:
      model: string
      prompt: string
      system: string
      max_tokens: integer
    output_shape:
      response: string
      model: string
      usage_tokens: integer
    query_tips: >
      Use claude-sonnet-4-6 for most tasks. claude-opus-4-6 for complex
      multi-step reasoning. claude-haiku-4-5 for high-volume, low-latency tasks.
    cost_hints:
      latency_ms: 2000
      tokens_consumed: 500
      idempotent: false
      side_effects: [consumes_api_budget]

  # ── Calendar ───────────────────────────────────────────────────────────────

  calendar_create_event:
    category: calendar
    description: >
      Creates a new event on Google Calendar and returns the event URL.
      Use for scheduling meetings, blocks, and reminders.
      Do NOT use to find available times — use calendar_find_slot first.
    concepts_required: [google.calendar, google.auth]
    alternatives: []
    composes_with: [calendar_invite_attendees]
    input_shape:
      title: string
      start_datetime: string
      end_datetime: string
      attendees: array
      description: string
      calendar_id: string
    output_shape:
      event_url: string
      event_id: string
    query_tips: >
      Always run calendar_find_slot before creating to avoid conflicts.
    cost_hints:
      latency_ms: 300
      tokens_consumed: 0
      idempotent: false
      side_effects: [creates_calendar_event, sends_calendar_invites]

  calendar_find_slot:
    category: calendar
    description: >
      Queries Google Calendar for free slots in a given date range and
      returns available time windows. Use before scheduling to avoid conflicts.
    concepts_required: [google.calendar, google.auth]
    alternatives: []
    composes_with: [calendar_create_event]
    input_shape:
      date_range_start: string
      date_range_end: string
      duration_minutes: integer
      calendar_ids: array
    output_shape:
      available_slots: array
      queried_range: string
      start_datetime: string
    query_tips: >
      Run before calendar_create_event to find the best slot.
    cost_hints:
      latency_ms: 400
      tokens_consumed: 0
      idempotent: true
      side_effects: []

  # ── Finance ────────────────────────────────────────────────────────────────

  notion_update_budget:
    category: finance
    description: >
      Updates a budget row in the Notion Finance database and returns
      the updated page ID. Use to record transactions, update forecasts,
      or flag budget deviations. Do NOT use to read budget data — use
      notion_query_database for reads.
    concepts_required: [notion.database, notion.auth, finance.budget]
    alternatives: []
    composes_with: []
    input_shape:
      page_id: string
      properties: object
    output_shape:
      page_id: string
      last_edited: string
    query_tips: >
      Always query first to get the page_id before updating.
    cost_hints:
      latency_ms: 350
      tokens_consumed: 0
      idempotent: false
      side_effects: [modifies_notion_database]

    # ── CARLOS-OS Memory & Knowledge (MCP Server) ─────────────────────────────
  # These tools are provided by the CARLOS-OS MCP server backed by Redis.
  # They give agents access to the internal memory store, knowledge base,
  # situational awareness layer, and action queue.

  search_facts:
    category: memory
    description: >
      BM25 full-text search over CARLOS-OS stored facts (4,000+ entries).
      Returns facts matching the query from the domain-specific knowledge base.
      Use for domain-specific knowledge, stored agent learnings, and context.
      Do NOT use for entity lookup (people, orgs) — use kb_hybrid_search instead.
    concepts_required: [carlos_os.memory]
    alternatives: [kb_hybrid_search, search_episodes]
    composes_with: [store_fact, list_situations, kb_hybrid_search]
    input_shape:
      query: string
      domain: string
      limit: integer
    output_shape:
      facts: array
      domain: string
      query: string
    query_tips: >
      Use specific key terms ("Korza equity"), NOT natural language questions.
      For entity lookup (people, orgs, dates), use kb_hybrid_search instead.
    cost_hints:
      latency_ms: 50
      tokens_consumed: 0
      idempotent: true
      side_effects: []

  store_fact:
    category: memory
    description: >
      Stores or updates a fact in the CARLOS-OS memory store (Redis).
      Use to persist agent-generated knowledge, user corrections, and domain
      context for future retrieval. Returns the stored key. Do NOT use for
      event logging — use emit_event instead.
    concepts_required: [carlos_os.memory]
    alternatives: []
    composes_with: [search_facts]
    input_shape:
      domain: string
      key: string
      value: string
      confidence: float
      source: string
    output_shape:
      stored_key: string
      domain: string
    query_tips: >
      Always specify domain (engineering, career, finance) to avoid cross-domain
      pollution. Use search_facts to check before overwriting.
    cost_hints:
      latency_ms: 30
      tokens_consumed: 0
      idempotent: false
      side_effects: [modifies_redis_store]

  list_situations:
    category: memory
    description: >
      Lists active cognitive situations the CARLOS-OS cognition layer is monitoring,
      sorted by urgency. Returns situations with confidence and urgency scores.
      Use for status checks, priority triage, and domain health overview.
      Do NOT use for task lookup — use list_actionables for tasks and commitments.
    concepts_required: [carlos_os.memory]
    alternatives: [list_actionables]
    composes_with: [search_facts, list_actionables]
    input_shape:
      state: string
      domain: string
      min_urgency: float
      limit: integer
    output_shape:
      situations: array
      domain: string
    query_tips: >
      Use for "what should I worry about?" queries. For specific tasks,
      deadlines, and commitments, use list_actionables instead.
    cost_hints:
      latency_ms: 100
      tokens_consumed: 0
      idempotent: true
      side_effects: []

  list_actionables:
    category: memory
    description: >
      Lists tasks, commitments, deadlines, and follow-ups from the CARLOS-OS
      action queue, sorted by risk score. Use for "what do I need to do?",
      "what's overdue?", or "what are my open commitments?". Do NOT use for
      situational awareness — use list_situations for monitoring states.
    concepts_required: [carlos_os.memory]
    alternatives: [list_situations]
    composes_with: [list_situations]
    input_shape:
      domain: string
      status: string
      limit: integer
    output_shape:
      actionables: array
      total: integer
      domain: string
    query_tips: >
      Use for tasks and deadlines. For situational awareness and
      monitoring states, use list_situations instead.
    cost_hints:
      latency_ms: 80
      tokens_consumed: 0
      idempotent: true
      side_effects: []

  kb_hybrid_search:
    category: search
    description: >
      Hybrid BM25 + vector + graph search over CARLOS-OS knowledge base entities
      extracted from Gmail, Calendar, and other sources. Returns people,
      organizations, dates, and financial entities. Use as the primary entity
      discovery tool. Do NOT use for agent facts — use search_facts instead.
    concepts_required: [carlos_os.knowledge_base]
    alternatives: [search_facts, kb_search_entities]
    composes_with: [search_facts, list_situations]
    input_shape:
      query: string
      entity_types: string
      limit: integer
    output_shape:
      entities: array
      total: integer
      query: string
      domain: string
    query_tips: >
      Use for people ("Who is X?"), orgs, and relationships. For stored agent
      knowledge, use search_facts. For exact name lookup, use kb_search_entities.
    cost_hints:
      latency_ms: 200
      tokens_consumed: 0
      idempotent: true
      side_effects: []

  kb_search_entities:
    category: search
    description: >
      Substring search over CARLOS-OS knowledge base entity names and aliases.
      Use for exact name lookup when you already know the entity name.
      Faster than kb_hybrid_search. Do NOT use for semantic search — prefer
      kb_hybrid_search when the exact name is unknown.
    concepts_required: [carlos_os.knowledge_base]
    alternatives: [kb_hybrid_search]
    composes_with: [kb_hybrid_search]
    input_shape:
      query: string
      entity_type: string
      limit: integer
    output_shape:
      entities: array
      query: string
    query_tips: >
      Use when you know the exact name ("Alice Smith", "Korza"). For semantic
      or fuzzy search, use kb_hybrid_search.
    cost_hints:
      latency_ms: 30
      tokens_consumed: 0
      idempotent: true
      side_effects: []

  search_episodes:
    category: memory
    description: >
      Searches episode summaries from CARLOS-OS session history. Episodes are
      agent-generated narratives of significant work sessions capturing what
      happened and the outcome. Use for "what work was done on X?",
      "what happened during sprint Y?". Do NOT use for current tasks — use
      list_actionables for open items.
    concepts_required: [carlos_os.memory]
    alternatives: [search_facts]
    composes_with: []
    input_shape:
      query: string
      domain: string
      agent: string
      limit: integer
    output_shape:
      episodes: array
    query_tips: >
      Use for historical session narratives. For stored facts and knowledge,
      use search_facts. For meeting notes, use search_notes_tool.
    cost_hints:
      latency_ms: 100
      tokens_consumed: 0
      idempotent: true
      side_effects: []

  # ── Stub entries (pattern only, not fully specified) ──────────────────────
  # The following tools follow the same structure. Fully specify before linting.

  github_assign_issue:
    category: project-management
    description: "Assigns a GitHub issue to one or more users."
    concepts_required: [github.repo, github.auth]
    alternatives: []
    composes_with: []
    input_shape: {repo: string, issue_number: integer, assignees: array}
    output_shape: {issue_url: string}
    cost_hints: {latency_ms: 200, idempotent: true, side_effects: []}

  github_add_label:
    category: project-management
    description: "Adds one or more labels to a GitHub issue or pull request."
    concepts_required: [github.repo, github.auth]
    alternatives: []
    composes_with: []
    input_shape: {repo: string, issue_number: integer, labels: array}
    output_shape: {issue_url: string}
    cost_hints: {latency_ms: 200, idempotent: true, side_effects: []}

  github_link_pr:
    category: project-management
    description: "Links a pull request to an issue via closing keyword."
    concepts_required: [github.repo, github.auth]
    alternatives: []
    composes_with: []
    input_shape: {repo: string, pr_number: integer, issue_number: integer}
    output_shape: {pr_url: string}
    cost_hints: {latency_ms: 200, idempotent: true, side_effects: []}

  github_close_issue:
    category: project-management
    description: "Closes a GitHub issue with an optional comment."
    concepts_required: [github.repo, github.auth]
    alternatives: []
    composes_with: []
    input_shape: {repo: string, issue_number: integer, comment: string}
    output_shape: {issue_url: string}
    cost_hints: {latency_ms: 200, idempotent: true, side_effects: [closes_github_issue]}

  github_request_review:
    category: devops
    description: "Requests review on a GitHub pull request from specified reviewers."
    concepts_required: [github.repo, github.auth]
    alternatives: []
    composes_with: []
    input_shape: {repo: string, pr_number: integer, reviewers: array}
    output_shape: {pr_url: string}
    cost_hints: {latency_ms: 250, idempotent: false, side_effects: [sends_github_notification]}

  linear_assign_issue:
    category: project-management
    description: "Assigns a Linear issue to a team member."
    concepts_required: [linear.project, linear.auth]
    alternatives: []
    composes_with: []
    input_shape: {issue_id: string, assignee_id: string}
    output_shape: {issue_url: string}
    cost_hints: {latency_ms: 200, idempotent: true, side_effects: []}

  linear_set_priority:
    category: project-management
    description: "Sets the priority level (0-4) of a Linear issue."
    concepts_required: [linear.project, linear.auth]
    alternatives: []
    composes_with: []
    input_shape: {issue_id: string, priority: integer}
    output_shape: {issue_url: string}
    cost_hints: {latency_ms: 200, idempotent: true, side_effects: []}

  linear_add_to_cycle:
    category: project-management
    description: "Adds a Linear issue to the current sprint cycle."
    concepts_required: [linear.project, linear.auth]
    alternatives: []
    composes_with: []
    input_shape: {issue_id: string, cycle_id: string}
    output_shape: {issue_url: string}
    cost_hints: {latency_ms: 200, idempotent: true, side_effects: []}

  linear_search_issues:
    category: project-management
    description: "Searches Linear issues by query string within a team."
    concepts_required: [linear.project, linear.auth]
    alternatives: [github_search_issues]
    composes_with: []
    input_shape: {query: string, team_id: string, state: string}
    output_shape: {issues: array, total_count: integer}
    query_tips: "Use for Linear-tracked work. For GitHub issues, use github_search_issues."
    cost_hints: {latency_ms: 300, idempotent: true, side_effects: []}

  slack_add_reaction:
    category: communication
    description: "Adds an emoji reaction to a Slack message."
    concepts_required: [slack.channel, slack.auth]
    alternatives: []
    composes_with: []
    input_shape: {channel_id: string, message_ts: string, emoji: string}
    output_shape: {ok: boolean}
    cost_hints: {latency_ms: 100, idempotent: true, side_effects: [sends_slack_reaction]}

  slack_send_message_thread:
    category: communication
    description: "Sends a threaded reply to a Slack message."
    concepts_required: [slack.channel, slack.auth]
    alternatives: []
    composes_with: []
    input_shape: {channel_id: string, thread_ts: string, text: string}
    output_shape: {message_ts: string}
    cost_hints: {latency_ms: 150, idempotent: false, side_effects: [sends_slack_message]}

  gmail_add_label:
    category: communication
    description: "Applies a label to a Gmail message or thread."
    concepts_required: [gmail.auth]
    alternatives: []
    composes_with: []
    input_shape: {message_id: string, label_ids: array}
    output_shape: {message_id: string}
    cost_hints: {latency_ms: 200, idempotent: true, side_effects: [modifies_gmail_label]}

  gmail_create_draft:
    category: communication
    description: "Creates a Gmail draft without sending it."
    concepts_required: [gmail.auth, gmail.identity]
    alternatives: []
    composes_with: []
    input_shape: {to: string, subject: string, body: string}
    output_shape: {draft_id: string}
    cost_hints: {latency_ms: 300, idempotent: false, side_effects: [creates_gmail_draft]}

  notion_query_database:
    category: finance
    description: "Queries a Notion database with filters and returns matching pages."
    concepts_required: [notion.database, notion.auth]
    alternatives: []
    composes_with: [notion_update_budget]
    input_shape: {database_id: string, filter: object, sorts: array}
    output_shape: {pages: array, total: integer, page_id: string}
    cost_hints: {latency_ms: 400, idempotent: true, side_effects: []}

  calendar_invite_attendees:
    category: calendar
    description: "Adds attendees to an existing Google Calendar event."
    concepts_required: [google.calendar, google.auth]
    alternatives: []
    composes_with: []
    input_shape: {event_id: string, calendar_id: string, attendees: array}
    output_shape: {event_url: string}
    cost_hints: {latency_ms: 300, idempotent: false, side_effects: [sends_calendar_invites]}

  python_execute:
    category: code
    description: >
      Executes Python code in an isolated subprocess and returns stdout,
      stderr, and exit code. Use for data processing, calculations, and
      script execution. Prefer over bash_execute for Python-specific tasks.
    concepts_required: [system.cwd]
    alternatives: [bash_execute]
    composes_with: []
    input_shape: {code: string, timeout_ms: integer}
    output_shape: {stdout: string, stderr: string, exit_code: integer}
    query_tips: "Use for Python code. For shell commands, use bash_execute."
    cost_hints: {latency_ms: 500, idempotent: false, side_effects: [may_modify_filesystem]}

  docs_search:
    category: search
    description: "Searches internal documentation and returns matching sections."
    concepts_required: []
    alternatives: [web_search]
    composes_with: []
    input_shape: {query: string, collection: string}
    output_shape: {results: array}
    query_tips: "Use for internal docs. For public web content, use web_search."
    cost_hints: {latency_ms: 200, idempotent: true, side_effects: []}

  gemini_invoke:
    category: ai-inference
    description: "Invokes Google Gemini for generation or multimodal tasks."
    concepts_required: [google.ai_auth]
    alternatives: [claude_invoke, gpt_invoke]
    composes_with: []
    input_shape: {model: string, prompt: string, max_tokens: integer}
    output_shape: {response: string, model: string, usage_tokens: integer}
    query_tips: "Prefer for Google Workspace integration tasks or when Gemini context is needed."
    cost_hints: {latency_ms: 1800, tokens_consumed: 400, idempotent: false, side_effects: [consumes_api_budget]}

  gpt_invoke:
    category: ai-inference
    description: "Invokes OpenAI GPT for generation tasks."
    concepts_required: [openai.auth]
    alternatives: [claude_invoke, gemini_invoke]
    composes_with: []
    input_shape: {model: string, prompt: string, max_tokens: integer}
    output_shape: {response: string, model: string, usage_tokens: integer}
    query_tips: "Use when OpenAI-specific capabilities are required (e.g. DALL-E, Whisper)."
    cost_hints: {latency_ms: 2200, tokens_consumed: 500, idempotent: false, side_effects: [consumes_api_budget]}

