# ── Patterns ────────────────────────────────────────────────────────────────

patterns:

  triage_and_track:
    name: "Triage a reported issue and create a tracking ticket"
    intent_triggers:
      - "create an issue for this bug"
      - "track this in Linear"
      - "file a GitHub issue"
      - "triage this problem"
    tool_sequence:
      - github_search_issues
      - linear_create_issue
      - [linear_assign_issue, linear_set_priority]
      - slack_send_message
    merge_strategy: all
    preconditions: [github.auth, linear.project, slack.channel]

  ship_feature:
    name: "Complete feature: PR + review request + team notification"
    intent_triggers:
      - "open a pull request"
      - "create a PR for this branch"
      - "ship this feature"
      - "submit for review"
    tool_sequence:
      - github_create_pr
      - github_request_review
      - slack_send_message
    merge_strategy: all
    preconditions: [github.repo, github.branch, slack.channel]

  schedule_meeting:
    name: "Find a slot and create a calendar event"
    intent_triggers:
      - "schedule a meeting"
      - "find a time to meet"
      - "book a slot with"
      - "set up a call"
    tool_sequence:
      - calendar_find_slot
      - calendar_create_event
      - [calendar_invite_attendees, gmail_send]
    merge_strategy: all
    preconditions: [google.calendar]

  research_and_draft:
    name: "Research a topic and draft a response or document"
    intent_triggers:
      - "research and draft"
      - "look up and write"
      - "find information and summarize"
    tool_sequence:
      - [web_search, docs_search, search_facts]
      - web_fetch
      - claude_invoke
      - file_write
    merge_strategy: all
    preconditions: [anthropic.auth, system.cwd, carlos_os.memory]

  carlos_os_status_check:
    name: "CARLOS-OS domain status: situations + actionables + knowledge"
    intent_triggers:
      - "what's happening with"
      - "status of"
      - "what should I focus on"
      - "give me a briefing on"
    tool_sequence:
      - [list_situations, list_actionables]
      - [search_facts, kb_hybrid_search]
    merge_strategy: all
    preconditions: [carlos_os.memory, carlos_os.knowledge_base]

  budget_update:
    name: "Query budget and record a transaction"
    intent_triggers:
      - "record a transaction"
      - "update the budget"
      - "log this expense"
    tool_sequence:
      - notion_query_database
      - notion_update_budget
      - slack_send_message
    merge_strategy: all
    preconditions: [notion.database, finance.budget, slack.channel]

  close_sprint_issue:
    name: "Close a Linear issue and notify the team"
    intent_triggers:
      - "mark as done"
      - "close this issue"
      - "complete this task"
    tool_sequence:
      - linear_set_priority
      - slack_send_message
    merge_strategy: all
    preconditions: [linear.project, slack.channel]

# ── Properties ──────────────────────────────────────────────────────────────

properties:

  mece_groups:
    - intent_class: "create a project tracking issue"
      tools: [github_create_issue, linear_create_issue]
      selection_criterion: >
        Use github_create_issue for GitHub-hosted repositories.
        Use linear_create_issue for CARLOS-OS sprint and project tracking.

    - intent_class: "send a message to a person or team"
      tools: [slack_send_message, gmail_send]
      selection_criterion: >
        Use slack_send_message for internal, real-time team communication.
        Use gmail_send for external parties, formal records, or when a thread history is required.

    - intent_class: "invoke an LLM for generation"
      tools: [claude_invoke, gemini_invoke, gpt_invoke]
      selection_criterion: >
        Default to claude_invoke (claude-sonnet-4-6).
        Use gemini_invoke for Google Workspace integration tasks.
        Use gpt_invoke only when OpenAI-specific capabilities are required.

  completeness_assertions:
    - scope: "core project management"
      tools:
        - github_create_issue
        - github_search_issues
        - github_assign_issue
        - github_add_label
        - github_close_issue
        - linear_create_issue
        - linear_assign_issue
        - linear_set_priority

    - scope: "core communication"
      tools:
        - slack_send_message
        - gmail_send
        - gmail_create_draft

  coherence_rules:
    - tools: [github_create_issue, linear_create_issue]
      reason: >
        These tools create duplicate tickets for the same intent if called together.
        A single intent should use one or the other, not both.

    - tools: [gmail_send, gmail_create_draft]
      reason: >
        gmail_send sends immediately; gmail_create_draft does not.
        Never call both for the same message — it creates a duplicate.
